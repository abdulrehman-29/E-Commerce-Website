<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-Ecommerce website</title>

    <script src="https://kit.fontawesome.com/744dbd8230.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="https://abdulrehman-29.github.io/JS-assignment-1/images/logo1.png" alt="">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="./shop.html">Shop All</a></li>
                <li><button onclick="commingsoon()">Watches</button></li>
                <li><button onclick="commingsoon()">Cart<button></li>
                <li><button onclick="commingsoon()">About Us<button></li>
                <li><button onclick="commingsoon()">Contact Us<button></li>
            </ul>
        </nav>
        <div class="headerEnd">
            <div class="login">
                <button onclick="commingsoon()">

                    <i class="fa-solid fa-user"></i>
                </button>
            </div>
            <div class="cart">
                <button onclick="commingsoon()">

                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </div>
        </div>
    </header>
    <section>
        <div class="shop-content">
            <h1>Shop</h1>
            <select id="select">
                <option value="All Category">All Category</option>
                <option value="footwear">footwear</option>
                <option value="cap">cap</option>
                <option value="watch">watch</option>
                <option value="shalwarKameez">shalwarKameez</option>
            </select>
        </div>
        <section class="three">
            <div class="product" id="product"></div>
        </section>
    </section>
        <footer>
            <div class="main2">
                <div class="brand">
                    <div class="logo"></div>
                    <p">Classic looks for Men, Women & Kids.</p>
                    <div class="socials">
                        <button onclick="commingsoon()"><i class="fab fa-instagram"></i></button>
                        <button onclick="commingsoon()"><i class="fab fa-facebook"></i></button>
                        <button onclick="commingsoon()"><i class="fab fa-linkedin"></i></button>
                        <button onclick="commingsoon()"><i class="fab fa-x-twitter"></i></button>
                    </div>
                </div>

                <div class="links">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><button onclick="commingsoon()" class="active">Home</button></li>
                        <li><button onclick="commingsoon()">Shop</button></li>
                        <li><button onclick="commingsoon()">About</button></li>
                        <li><button onclick="commingsoon()">Contact</button></li>
                    </ul>
                </div>

                <div class="links">
                    <h4>Shop</h4>
                    <ul>
                        <li><button onclick="commingsoon()">Mens Wear</button></li>
                        <li><button onclick="commingsoon()">Womens Wear</button></li>
                        <li><button onclick="commingsoon()">Kids Wear</button></li>
                        <li><button onclick="commingsoon()">Accessories</button></li>
                    </ul>
                </div>

                <div class="links">
                    <h4>Help</h4>
                    <ul>
                        <li><button onclick="commingsoon()">FAQ's</button></li>
                        <li><button onclick="commingsoon()">Return Policy</button></li>
                        <li><button onclick="commingsoon()">Order Status</button></li>
                        <li><button onclick="commingsoon()">Shipping</button></li>
                    </ul>
                </div>

                <div class="links">
                    <h4>My Profile</h4>
                    <ul>
                        <li><button onclick="commingsoon()">My Account</button></li>
                        <li><button onclick="commingsoon()">Track Order</button></li>
                        <li><button onclick="commingsoon()">My C    art</button></li>
                        <li><button onclick="commingsoon()">History</button></li>
                    </ul>
                </div>
            </div>

            <hr>

            <div class="bottom">
                <div>Copyright © 2026 Clothing Store. All rights reserved.</div>
                <div class="payments">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/button4/Mastercard_2019_logo.svg"
                        alt="Mastercard">
                </div>
            </div>
        </footer>
</body>
<script src="shop.js"></script>

</html>
